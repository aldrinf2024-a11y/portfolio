<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QrCode — Aldrin Fomukong</title>
  <style>
    :root{--bg:#f8fbff;--panel:#ffffff;--text:#0f172a;--muted:#64748b;--accent:#2563eb;--border:#dbe5f4;--shadow:0 12px 28px rgba(15,23,42,.08);--radius:18px;--max:900px}*{box-sizing:border-box}html,body{margin:0;padding:0}body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(900px 500px at 10% 0%,rgba(37,99,235,.08),transparent 60%),var(--bg);color:var(--text);line-height:1.6}a{text-decoration:none;color:inherit}.container{max-width:var(--max);margin:0 auto;padding:0 20px}.site-header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}.site-header .container{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 20px;flex-wrap:wrap}.brand{display:flex;gap:14px;align-items:center}.logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#93c5fd,#c4b5fd);display:grid;place-items:center;font-weight:800}.tagline{margin:.15rem 0 0;color:var(--muted);font-size:.95rem}.nav-mini{display:flex;gap:10px;flex-wrap:wrap}.nav-mini a,.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:#fff;font-weight:700}.nav-mini a.active,.btn{background:rgba(37,99,235,.10)}.section{padding:48px 0}.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}.doc-header,.doc-actions{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:flex-start}.qrcode{display:grid;place-items:center;padding:18px 0}.qrcode img{width:240px;height:240px;border-radius:16px;border:1px solid var(--border);background:#fff;padding:10px}.muted{color:var(--muted)}.footer{padding:22px 0;border-top:1px solid var(--border)}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand">
        <div class="logo" aria-hidden="true">AF</div>
        <div>
          <h1>Aldrin Fomukong</h1>
          <p class="tagline">Portfolio QR Code</p>
        </div>
      </div>
      <nav class="nav-mini">
        <a href="Website.html">Home</a>
        <a href="ChatBot.html">ChatBot</a>
        <a href="GitHub.html">GitHub</a>
        <a href="resume.html">Resume</a>
        <a class="active" href="QrCode.html">QrCode</a>
        <a href="CompleteProject.html">Complete Project</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="card">
        <div class="doc-header">
          <div>
            <h2>QrCode</h2>
            <p class="muted">Scan this QR code to open the website quickly on a phone or another device.</p>
          </div>
          <div class="doc-actions">
            <a class="btn" href="Website.html">Open Website</a>
            <a class="btn" href="resume.html">Open Resume</a>
          </div>
        </div>

        <div class="qrcode">
          <img id="qrImage" alt="Portfolio QR code" />
        </div>
        <p>Current website URL: <a data-portfolio-url href="Website.html"></a></p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p class="muted">© <span id="year"></span> Aldrin Fomukong</p>
    </div>
  </footer>

  <script>
    function getPortfolioUrl(){ return new URL('Website.html', window.location.href).href; }
    document.addEventListener('DOMContentLoaded',()=>{
      const y=document.getElementById('year'); if(y) y.textContent=String(new Date().getFullYear());
      const url=getPortfolioUrl();
      document.querySelectorAll('[data-portfolio-url]').forEach((el)=>{ el.href=url; el.textContent=url; });
      const qr=document.getElementById('qrImage'); if(qr) qr.src='https://api.qrserver.com/v1/create-qr-code/?size=240x240&data='+encodeURIComponent(url);
    });
  </script>
</body>
</html>
